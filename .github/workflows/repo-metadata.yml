name: Set repository metadata

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  metadata: write

jobs:
  metadata:
    runs-on: ubuntu-latest
    steps:
      - name: Configure description, homepage, and topics
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          curl -fsSL -X PATCH \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}" \
            -d '{"description":"ETL starter: pull Feedico merchants and coupons into SQLite. Docs: feedico.io/docs","homepage":"https://feedico.io"}'

          curl -fsSL -X PUT \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/topics" \
            -d '{"names":["feedico","etl","coupon-warehouse","data-pipeline","sqlite","coupon-api","affiliate-api","python"]}'
