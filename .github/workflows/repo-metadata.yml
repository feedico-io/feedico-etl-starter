name: Set repository metadata

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  metadata: write

jobs:
  metadata:
    runs-on: ubuntu-latest
    steps:
      - name: Configure repository About section
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api --method PATCH "repos/${{ github.repository }}" \
            -f description='ETL starter: pull Feedico merchants and coupons into SQLite. Docs: feedico.io/docs' \
            -f homepage='https://feedico.io'

          echo '{"names":["feedico","etl","coupon-warehouse","data-pipeline","sqlite","coupon-api","affiliate-api","python"]}' \
            | gh api --method PUT "repos/${{ github.repository }}/topics" --input -
